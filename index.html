<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Myntra Clone</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <header class="header">
      <!--Logo-->
      <div class="logo">
        <a href="#" class="myntra_logo">
          <img src="images/myntra_logo.webp" alt="Myntra Logo" />
        </a>
      </div>

      <!--Nav Links-->

      <nav class="nav_bar">
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">Kids</a>
        <a href="#">Home</a>
        <a href="#">Beauty</a>
        <a href="#">Genz</a>
        <a href="#">Studio <sup id="position">New</sup></a>
      </nav>

      <!--Search Bar-->

      <div class="search_bar">
        <span class="material-symbols-outlined search_icon"> search </span>
        <input
          class="search_input"
          type="text"
          placeholder="Search for products, brands and more"
        />
      </div>

      <!--Action Bar-->

      <div class="action_bar">
        <div class="action_container">
          <span class="material-symbols-outlined action_icon"> person </span>
          <span class="action_name">Profile</span>
        </div>

        <div class="action_container">
          <span class="material-symbols-outlined action_icon"> favorite </span>
          <span class="action_name">Wishlist</span>
        </div>

        <div class="action_container">
          <span class="material-symbols-outlined action_icon">
            shopping_bag
          </span>
          <span class="action_name">Bag</span>
        </div>
      </div>
    </header>
    <main>
      <!--Side Tag-->
      <section>
        <div class="side_tag">Upto Rs. 300 Off</div>
      </section>

      <!--Banner-->
      <section>
        <div class="first_purchase">
          <div class="off">Flat Rs.300 Off</div>

          <div class="app">
            <div>On your 1<sup>st</sup> Purchase</div>

            <div>
              Via
              <img src="images/myntra_logo.webp" alt="myntra logo" />
              App!
            </div>
          </div>
        </div>

        <div class="main_banner">
          <div class="mega_sale">
            <div class="mega_sale_inner">
              <div id="mega1" class="mega">Mega</div>
              <div id="mega2" class="mega">%</div>
              <div id="mega3" class="mega">Savings Sale</div>
            </div>
            <div>🔴Live Now</div>
          </div>

          <div class="banner">
            <img src="images/banner.jpg" alt="banner" />
          </div>

          <div class="fifty">
            <div class="banner_quote">
              <div class="percentage_container">
                <div class="percentage">50-80%</div>
                <div class="per">Off</div>
              </div>

              <div class="quote">Offers You Can't Resist</div>
            </div>
          </div>
        </div>
      </section>
      <section>Category Heading and Items</section>
    </main>
    <footer>Footer</footer>
  </body>
</html>
